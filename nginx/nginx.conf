# nginx/nginx.conf
# Production reverse proxy for research-agent.
#
# Place TLS certificates at:
#   nginx/certs/cert.pem   — certificate (+ intermediate chain)
#   nginx/certs/key.pem    — private key  (chmod 600, owned by root)
#
# Generate a self-signed cert for local testing:
#   mkdir -p nginx/certs
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/certs/key.pem -out nginx/certs/cert.pem \
#     -subj "/CN=localhost"
#
# For production, use Let's Encrypt / Certbot or Caddy.

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Hide nginx version in headers and error pages ─────────────────────────
    server_tokens off;

    # ── Global rate limiting ──────────────────────────────────────────────────
    # SECURITY: Limits each client IP to 10 requests/second.
    # Burst allows short spikes; nodelay rejects excess immediately.
    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

    # Tighter zone for the /start endpoint (kicks off expensive LLM calls).
    limit_req_zone $binary_remote_addr zone=research:10m rate=1r/m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream agent {
        server agent:5000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # SECURITY: Redirect all plain-HTTP traffic to HTTPS immediately.
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # SECURITY: Only TLS 1.2 and 1.3; disable older vulnerable versions.
        ssl_protocols TLSv1.2 TLSv1.3;

        # SECURITY: Strong ciphers only; prefer server order.
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # SECURITY: Enable OCSP stapling for fast revocation checks.
        ssl_stapling on;
        ssl_stapling_verify on;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ─────────────────────────────────────────────────
        # SECURITY: HSTS — tell browsers to only use HTTPS for 2 years.
        # Add includeSubDomains and preload only when all subdomains support HTTPS.
        add_header Strict-Transport-Security "max-age=63072000" always;

        add_header X-Content-Type-Options   "nosniff"          always;
        add_header X-Frame-Options          "DENY"             always;
        add_header X-XSS-Protection         "1; mode=block"    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'"
            always;
        add_header Permissions-Policy
            "geolocation=(), microphone=(), camera=()"
            always;

        # ── Request limits ───────────────────────────────────────────────────
        client_max_body_size 64k;    # Research questions are small
        client_body_timeout  10s;
        client_header_timeout 10s;

        # ── Global rate limit ─────────────────────────────────────────────────
        limit_req zone=global burst=20 nodelay;

        # ── SSE endpoint: long-lived connections, no read timeout ─────────────
        location /stream/ {
            limit_req zone=global burst=5 nodelay;

            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE requires: no buffering, no read timeout, chunked transfer
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            chunked_transfer_encoding on;
        }

        # ── Research /start endpoint: strict rate limit ───────────────────────
        location /start {
            # SECURITY: Hard cap: 1 research request per minute per IP.
            # This prevents abuse of the expensive LLM + search pipeline.
            limit_req zone=research burst=2 nodelay;
            limit_req_status 429;

            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # ── Download endpoint ─────────────────────────────────────────────────
        location /download {
            limit_req zone=global burst=10 nodelay;

            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── All other routes ──────────────────────────────────────────────────
        location / {
            proxy_pass         http://agent;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
